name: Docker

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Docker tag to build, for example v0.1.0 or latest"
        required: true
        default: latest
        type: string
      push:
        description: "Push image to GitHub Container Registry"
        required: true
        default: false
        type: boolean
      context:
        description: "Docker build context"
        required: true
        default: "."
        type: string
      dockerfile:
        description: "Dockerfile path"
        required: true
        default: "Dockerfile"
        type: string
      platforms:
        description: "Comma-separated platforms for buildx"
        required: true
        default: "linux/amd64,linux/arm64"
        type: string
      compose_file:
        description: "Optional compose file path. If set, runs docker compose build instead of buildx."
        required: false
        default: ""
        type: string

permissions:
  contents: read
  packages: write

jobs:
  docker:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute image name
        id: image
        run: |
          image="ghcr.io/${GITHUB_REPOSITORY,,}"
          echo "name=${image}" >> "$GITHUB_OUTPUT"
          echo "Using image ${image}"

      - name: Validate inputs
        run: |
          set -euo pipefail
          if [ -n "${{ inputs.compose_file }}" ]; then
            test -f "${{ inputs.compose_file }}" || {
              echo "compose_file does not exist: ${{ inputs.compose_file }}" >&2
              exit 1
            }
          else
            test -f "${{ inputs.dockerfile }}" || {
              echo "dockerfile does not exist: ${{ inputs.dockerfile }}" >&2
              exit 1
            }
          fi

      - name: Set up Docker Buildx
        if: ${{ inputs.compose_file == '' }}
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: ${{ inputs.push }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build compose services
        if: ${{ inputs.compose_file != '' }}
        run: docker compose -f "${{ inputs.compose_file }}" build

      - name: Build Docker image
        if: ${{ inputs.compose_file == '' }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          platforms: ${{ inputs.platforms }}
          push: ${{ inputs.push }}
          tags: ${{ steps.image.outputs.name }}:${{ inputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
