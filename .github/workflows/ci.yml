name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  lint-and-test:
    name: Lint and test
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: 1.95.0
          components: rustfmt, clippy
          targets: x86_64-unknown-linux-musl

      - name: Cache Rust builds
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Install cargo-audit
        uses: taiki-e/install-action@c7eb1735f09259a5035e8e5d44b1406b1cddc0fb # v2
        with:
          tool: cargo-audit@0.22.2

      - name: Audit dependencies
        run: |
          rsa_tree="$(cargo tree --locked --edges normal -i rsa 2>/dev/null || true)"
          if [ -n "$rsa_tree" ]; then
            echo "RUSTSEC-2023-0071 is ignored only while rsa is absent from the built graph" >&2
            printf '%s\n' "$rsa_tree" >&2
            exit 1
          fi
          cargo audit -D warnings

      - name: Verify embedded static socket bridge
        run: |
          rustc --edition=2024 --target x86_64-unknown-linux-musl -D warnings \
            -C opt-level=z -C strip=symbols -C panic=abort \
            helpers/socket_bridge.rs -o /tmp/dbev-socket-bridge
          expected="$(sha256sum /tmp/dbev-socket-bridge | awk '{print $1}')"
          grep -Fq "$expected" build.rs

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Test
        run: cargo test --workspace --locked

      - name: Release build
        run: cargo build --workspace --release --locked
