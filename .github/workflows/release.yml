name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag, for example v0.1.0"
        required: true
        type: string
      create_github_release:
        description: "Create a GitHub release and upload binaries"
        required: true
        default: true
        type: boolean
      draft:
        description: "Create the GitHub release as a draft"
        required: true
        default: false
        type: boolean
      prerelease:
        description: "Mark the GitHub release as a prerelease"
        required: true
        default: false
        type: boolean
      release_notes:
        description: "Release notes shown on GitHub"
        required: false
        default: ""
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-gnu
          - aarch64-unknown-linux-musl
          - armv7-unknown-linux-gnueabihf

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate version input
        run: |
          if ! printf '%s' "${{ inputs.version }}" | grep -Eq '^v[0-9]+(\.[0-9]+){1,2}([-.][0-9A-Za-z.-]+)?$'; then
            echo "version must look like v0.1.0" >&2
            exit 1
          fi

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Cache Rust builds
        uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Build release binary
        run: cross build --workspace --release --locked --target ${{ matrix.target }}

      - name: Package binary
        run: |
          set -euo pipefail
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/dbev" "dbev-${{ inputs.version }}-${{ matrix.target }}"
          chmod 0755 "dbev-${{ inputs.version }}-${{ matrix.target }}"
          sha256sum "dbev-${{ inputs.version }}-${{ matrix.target }}" > "dbev-${{ inputs.version }}-${{ matrix.target }}.sha256"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: dbev-${{ inputs.version }}-${{ matrix.target }}
          path: |
            dbev-${{ inputs.version }}-${{ matrix.target }}
            dbev-${{ inputs.version }}-${{ matrix.target }}.sha256
          if-no-files-found: error

  github-release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: build
    if: ${{ inputs.create_github_release }}
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          target_commitish: ${{ github.sha }}
          name: DatabasesEverywhere ${{ inputs.version }}
          body: ${{ inputs.release_notes }}
          draft: ${{ inputs.draft }}
          prerelease: ${{ inputs.prerelease }}
          fail_on_unmatched_files: true
          files: |
            dist/dbev-*
            dist/*.sha256
