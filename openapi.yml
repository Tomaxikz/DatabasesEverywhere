  /ws/monitoring:
    get:
      summary: WebSocket stream of instance resource snapshots.
      description: >-
        Requires a short-lived WebSocket JWT with monitor:read. Non-browser clients may send Authorization: Bearer <jwt>. Browser clients should use Sec-WebSocket-Protocol with ["dbe.jwt", "<jwt>"]. Query-string tokens are rejected. Messages include current instance stats plus install_progress entries for create, image-update, and major-upgrade operations. Each instance includes configured limits plus live usage fields: cpu_usage_percent, memory_usage_bytes, memory_limit_bytes, disk_used_bytes, network_rx_bytes, network_tx_bytes, and a resources object matching GET /api/instances/{instance_id}/resources.
      x-required-scope: monitor:read
      x-websocket: true
      responses:
        default:
          $ref: "#/components/responses/ApiError"
        "101":
          description: WebSocket upgrade.
  /ws/instances/{instance_id}/logs:
    get:
      summary: WebSocket stream of container logs for one instance.
      description: >-
        Requires a short-lived WebSocket JWT with logs:read. Non-browser clients may send Authorization: Bearer <jwt>. Browser clients should use Sec-WebSocket-Protocol with ["dbe.jwt", "<jwt>"]. Query-string tokens are rejected.
      x-required-scope: logs:read
      x-websocket: true
      parameters:
        - name: instance_id
          in: path
          required: true
          schema:
            type: string
      responses:
        default:
          $ref: "#/components/responses/ApiError"
        "101":
          description: WebSocket upgrade.
  /ws/instances/{instance_id}/import-export:
    get:
      summary: WebSocket stream of import/export jobs for one instance.
      description: Requires a short-lived WebSocket JWT with import-export:read and access to the instance in the path.
