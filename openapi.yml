openapi: 3.1.0
info:
  title: DatabasesEverywhere API
  version: 0.2.0
  description: API used by panels/addons to create, manage, monitor, back up, and restore hosted database instances.
servers:
  - url: http://127.0.0.1:8090
    description: Local daemon API
security:
  - bearerAuth: []
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: panel token
  schemas:
    Protocol:
      type: string
      enum: [postgres, redis, mariadb, mongodb, clickhouse, qdrant]
    LimitsRequest:
      type: object
      additionalProperties: false
      required: [cpu_cores, memory_mib, disk_mib]
      properties:
        cpu_cores:
          type: number
          minimum: 0.01
          maximum: 1024
          example: 0.5
        memory_mib:
          type: integer
          minimum: 1
          maximum: 1048576
          example: 512
        disk_mib:
          type: integer
          minimum: 1
          example: 1024
    InstanceLimits:
      allOf:
        - $ref: "#/components/schemas/LimitsRequest"
        - type: object
          properties:
            disk_enforced:
              type: boolean
            disk_enforcement_method:
              type: string
              example: host_filesystem_quota
    CreateInstanceRequest:
      type: object
      additionalProperties: false
      required: [instance_id, protocol, database, username, password, public_host]
      properties:
        instance_id:
          type: string
          example: inst_server_123_pg
        protocol:
          $ref: "#/components/schemas/Protocol"
        database:
          type: string
          example: server_123
        username:
          type: string
          example: app_server_123
        password:
          type: string
          format: password
        public_host:
          type: string
          example: db.example.com
        public_port:
          type: [integer, "null"]
          example: 5434
        image:
          type: [string, "null"]
          example: postgres:18.4
          description: Optional pinned container image for this instance. The image must be the configured default or listed in images.allowed.<protocol>; omit this field to use the node default.
        project_id:
          type: [string, "null"]
          example: server-123
        limits:
          $ref: "#/components/schemas/LimitsRequest"
        purge_stale_resources:
          type: boolean
          default: false
          description: Irreversibly remove an orphaned container and persistent paths for this instance_id before retrying creation. Requires purge_stale_resources_confirmation.
        purge_stale_resources_confirmation:
          oneOf:
            - $ref: "#/components/schemas/DestructiveActionConfirmation"
            - type: "null"
    Instance:
      type: object
      required: [schema_version, instance_id, protocol, status, public, backend, runtime, database, limits, created_at, updated_at]
      properties:
        schema_version:
          type: integer
        instance_id:
          type: string
        protocol:
          $ref: "#/components/schemas/Protocol"
        status:
          type: string
          enum: [creating, running, stopped, failed, quarantined, deleting]
        public:
          type: object
          required: [host, port]
          properties:
            host:
              type: string
            port:
              type: integer
        backend:
          description: >-
            Active instances use unix_socket. docker_tcp is returned only for
            legacy records quarantined during migration and is never connected.
          oneOf:
            - type: object
              required: [kind, socket_path]
              properties:
                kind:
                  type: string
                  const: unix_socket
                socket_path:
                  type: string
            - type: object
              required: [kind, host, port]
              properties:
                kind:
                  type: string
                  const: docker_tcp
                host:
                  type: string
                port:
                  type: integer
        runtime:
          type: object
          required: [kind, container_name, network_mode]
          properties:
            kind:
              type: string
              example: docker
            container_name:
              type: string
            network_mode:
              type: string
              const: none
        database:
          type: object
          required: [name, username]
          properties:
            name:
              type: string
            username:
              type: string
        route_key_sha256:
          type: string
          description: Optional SHA-256 fingerprint of the instance gateway route key.
        limits:
          $ref: "#/components/schemas/InstanceLimits"
        image:
          type: object
          required: [current, configured, update_available]
          properties:
            current:
              type: [string, "null"]
            configured:
              type: string
            update_available:
              type: boolean
        database_version:
          type: object
          required: [current, error]
          properties:
            current:
              type: [string, "null"]
            error:
              oneOf:
                - $ref: "#/components/schemas/PublicDiagnostic"
                - type: "null"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    SystemResponse:
      type: object
      additionalProperties: false
      required: [service, version, api_version, uuid, token_id, remote, api_host, api_port, api_bind, api_ssl_enabled, daemon_engine, daemon_socket, database_container_network_mode, database_backend_transport, daemon_disk_limits_enforced, disk_mode, postgres_enabled, redis_enabled, mariadb_enabled, mongodb_enabled, clickhouse_enabled, clickhouse_http_enabled, clickhouse_http_bind, clickhouse_http_port, qdrant_enabled]
      properties:
        service: {type: string, const: databases-everywhere}
        version: {type: string}
        api_version: {type: string, example: 0.2.0}
        uuid: {type: string}
        token_id: {type: string}
        remote: {type: string, format: uri}
        api_host: {type: string}
        api_port: {type: integer}
        api_bind: {type: string}
        api_ssl_enabled: {type: boolean}
        daemon_engine: {type: string, enum: [docker, podman]}
        daemon_socket: {type: string}
        database_container_network_mode: {type: string, const: none}
        database_backend_transport: {type: string, const: unix_socket}
        daemon_disk_limits_enforced: {type: boolean}
        disk_mode: {type: string}
        postgres_enabled: {type: boolean}
        redis_enabled: {type: boolean}
        mariadb_enabled: {type: boolean}
        mongodb_enabled: {type: boolean}
        clickhouse_enabled: {type: boolean}
        clickhouse_http_enabled: {type: boolean}
        clickhouse_http_bind: {type: string}
        clickhouse_http_port: {type: integer}
        qdrant_enabled: {type: boolean}
    HeartbeatResponse:
      type: object
      required: [status, gateways]
      properties:
        status: {type: string, enum: [ok, not_ready]}
        gateways:
          $ref: "#/components/schemas/GatewayReadiness"
    GatewayReadiness:
      type: object
      additionalProperties: false
      required: [status, expected_listeners, ready_listeners]
      properties:
        status: {type: string, enum: [starting, ready, failed, stopping]}
        expected_listeners: {type: integer, minimum: 0}
        ready_listeners: {type: integer, minimum: 0}
        failure: {type: string}
    InstanceStatusResponse:
      type: object
      required: [instance_id, status]
      properties:
        instance_id: {type: string}
        status:
          type: string
          enum: [creating, running, stopped, failed, quarantined, deleting]
        progress:
          $ref: "#/components/schemas/InstallProgress"
    CreateInstanceAcceptedResponse:
      type: object
      additionalProperties: false
      required: [instance_id, status, status_url]
      properties:
        instance_id: {type: string}
        status:
          type: string
          const: creating
        status_url:
          type: string
          description: Origin-relative URL for polling creation status and progress.
    InstallProgress:
      type: object
      additionalProperties: false
      required: [instance_id, protocol, action, status, stage, message, image, layer, current, total, percent, updated_at]
      properties:
        instance_id: {type: string}
        protocol: {$ref: "#/components/schemas/Protocol"}
        action: {type: string, enum: [create, image_update, major_upgrade]}
        status: {type: string, enum: [running, completed, failed]}
        stage: {type: string}
        message: {type: string}
        image: {type: [string, "null"]}
        layer: {type: [string, "null"]}
        current: {type: [integer, "null"]}
        total: {type: [integer, "null"]}
        percent: {type: [number, "null"]}
        diagnostic:
          $ref: "#/components/schemas/PublicDiagnostic"
        updated_at: {type: string, format: date-time}
    DeleteInstanceResponse:
      type: object
      required: [instance_id, deleted, purged]
      properties:
        instance_id: {type: string}
        deleted: {type: boolean}
        purged: {type: boolean}
    Error:
      type: object
      additionalProperties: false
      required: [error, code]
      properties:
        error:
          type: string
        code:
          type: string
        error_id:
          type: string
          format: uuid
          description: Opaque support identifier included only for server-side failures.
    PublicDiagnostic:
      type: object
      additionalProperties: false
      required: [code, message]
      properties:
        code: {type: string}
        message: {type: string, maxLength: 512}
        error_id:
          type: string
          format: uuid
          description: Opaque identifier for correlating an internal asynchronous failure with daemon logs.
    ImportRequest:
      type: object
      additionalProperties: false
      required: [source]
      properties:
        source:
          $ref: "#/components/schemas/ArtifactImportSource"
        selection:
          $ref: "#/components/schemas/ImportExportSelection"
    ExportRequest:
      type: object
      additionalProperties: false
      properties:
        archive_format:
          type: [string, "null"]
          enum: [plain, gzip, bzip2, null]
        selection:
          $ref: "#/components/schemas/ImportExportSelection"
    ArtifactImportSource:
      type: object
      additionalProperties: false
      required: [type, artifact_id]
      properties:
        type:
          type: string
          const: artifact
        artifact_id:
          type: string
          description: ID returned by this instance's artifacts endpoint, or the filename of an operator-staged file under paths.imports/<instance_id>/.
        archive_format:
          type: [string, "null"]
          enum: [plain, gzip, bzip2, tar, tar.gz, zip, rar, null]
          description: Archive wrapper to remove before import. Omit for an unwrapped dump and for Redis/Qdrant physical archives.
    ImportExportSelection:
      type: object
      additionalProperties: false
      properties:
        mode:
          type: string
          enum: [full, selective]
          default: full
        include:
          type: array
          items:
            type: string
        exclude:
          type: array
          items:
            type: string
        fields:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
    ImportExportJob:
      type: object
      required: [job_id, instance_id, action, status, artifact_id, artifact_size_bytes, error, created_at, updated_at]
      properties:
        job_id:
          type: string
        instance_id:
          type: string
        action:
          type: string
          enum: [export, import]
        status:
          type: string
          enum: [queued, running, succeeded, failed]
        artifact_id:
          type: [string, "null"]
        artifact_size_bytes:
          type: [integer, "null"]
        error:
          oneOf:
            - $ref: "#/components/schemas/PublicDiagnostic"
            - type: "null"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    StoredArtifact:
      type: object
      required: [id, instance_id, size_bytes, modified_at, sha256]
      properties:
        id:
          type: string
        instance_id:
          type: string
        size_bytes:
          type: integer
        modified_at:
          type: string
          format: date-time
        sha256:
          type: string
    CreateDownloadRequest:
      type: object
      additionalProperties: false
      properties:
        expires_in_seconds:
          type: integer
          minimum: 1
          maximum: 900
          default: 120
        single_use:
          type: boolean
          default: true
    DownloadUrlResponse:
      type: object
      additionalProperties: false
      required: [url, expires_at_unix, single_use]
      properties:
        url:
          type: string
          description: Origin-relative temporary download URL containing the short-lived capability.
        expires_at_unix: {type: integer}
        single_use: {type: boolean}
    DeleteArtifactResponse:
      type: object
      required: [id, deleted]
      properties:
        id: {type: string}
        deleted: {type: boolean}
    RetentionResponse:
      type: object
      required: [deleted]
      properties:
        deleted:
          type: array
          items: {type: string}
    BackupStatusResponse:
      type: object
      required: [enabled, interval_minutes, run_on_startup, retention_keep_latest_per_instance, retention_max_age_days, redis_excluded]
      properties:
        enabled: {type: boolean}
        interval_minutes: {type: integer}
        run_on_startup: {type: boolean}
        retention_keep_latest_per_instance: {type: integer}
        retention_max_age_days: {type: integer}
        redis_excluded: {type: boolean}
    SkippedBackup:
      type: object
      required: [instance_id, protocol, reason]
      properties:
        instance_id: {type: string}
        protocol: {$ref: "#/components/schemas/Protocol"}
        reason: {$ref: "#/components/schemas/PublicDiagnostic"}
    RunBackupsResponse:
      type: object
      additionalProperties: false
      required: [backups, skipped]
      properties:
        backups:
          type: array
          items: {$ref: "#/components/schemas/StoredArtifact"}
        skipped:
          type: array
          items: {$ref: "#/components/schemas/SkippedBackup"}
    RestoreBackupResponse:
      type: object
      additionalProperties: false
      required: [instance_id, backup_id, restored]
      properties:
        instance_id: {type: string}
        backup_id: {type: string}
        restored: {type: boolean}
    DestructiveActionConfirmation:
      type: object
      additionalProperties: false
      required: [confirm, reason]
      properties:
        confirm:
          type: boolean
          const: true
        reason:
          type: string
          minLength: 1
          maxLength: 512
    WsTokenRequest:
      type: object
      additionalProperties: false
      required: [subject, scopes]
      properties:
        subject:
          type: string
        scopes:
          type: array
          items:
            type: string
            enum: [monitor:read, logs:read, import-export:read]
          example: [monitor:read]
        instances:
          type: array
          items:
            type: string
          default: []
          maxItems: 256
          description: Explicit instance allow-list. Must be non-empty unless all_instances is true.
        all_instances:
          type: boolean
          default: false
          description: Explicitly grants node-wide instance access and cannot be combined with a non-empty instances list.
        ttl_seconds:
          type: integer
          minimum: 1
          maximum: 3600
          default: 900
    WsTokenResponse:
      type: object
      required: [token_type, token, expires_at_unix]
      properties:
        token_type: {type: string, const: Bearer}
        token: {type: string}
        expires_at_unix: {type: integer}
    PowerRequest:
      type: object
      additionalProperties: false
      required: [action]
      properties:
        action:
          type: string
          enum: [start, stop, restart, kill]
    PowerResponse:
      type: object
      required: [action, instance]
      properties:
        action:
          type: string
          enum: [start, stop, restart, kill]
        instance:
          $ref: "#/components/schemas/Instance"
    UpdateInstanceImageRequest:
      type: object
      additionalProperties: false
      required: [image]
      properties:
        image:
          type: string
          example: mongo:8.3.4
          description: Pinned target image. Must be the configured default image or listed in images.allowed.<protocol>. Bare images and latest tags are rejected.
        password:
          type: [string, "null"]
          format: password
          description: Current tenant database password. Required for most protocols so DBE can recreate users after the container is rebuilt. Redis does not require it.
        major_upgrade:
          type: boolean
          default: false
          description: Set true only after an explicit admin confirmation when the image changes database major version. DBE then runs its export/import migration workflow instead of a same-volume recreate.
    ImageUpdateStrategy:
      type: string
      enum: [in_place_recreate, major_upgrade_migration]
    UpdateInstanceImageResponse:
      type: object
      properties:
        instance:
          $ref: "#/components/schemas/Instance"
        image:
          type: string
          description: Target image applied to the instance.
        recreated:
          type: boolean
        strategy:
          $ref: "#/components/schemas/ImageUpdateStrategy"
        warnings:
          type: array
          items:
            type: string
          description: Provider-style warnings the panel should show after a successful upgrade.
        export_artifact_id:
          type: [string, "null"]
          description: Logical export artifact kept after a major upgrade for rollback/audit.
        old_volume_backup_retained:
          type: boolean
          description: Whether the old volume was retained on the node for manual rollback.
    ConfigPatchResponse:
      type: object
      required: [applied, restart_required, config_path]
      properties:
        applied:
          type: boolean
        restart_required:
          type: boolean
        config_path:
          type: string
    LogsResponse:
      type: object
      required: [instance_id, stdout, stderr]
      properties:
        instance_id: {type: string}
        stdout: {type: string}
        stderr: {type: string}
    ResourceReport:
      type: object
      required: [instance_id, protocol, status, cpu, memory, disk, network]
      properties:
        instance_id: {type: string}
        protocol: {type: string}
        status: {type: string}
        cpu:
          type: object
          required: [configured_cores, usage_percent]
          properties:
            configured_cores: {type: number}
            usage_percent: {type: [number, "null"]}
        memory:
          type: object
          required: [configured_mib, usage_bytes, limit_bytes]
          properties:
            configured_mib: {type: integer}
            usage_bytes: {type: [integer, "null"]}
            limit_bytes: {type: [integer, "null"]}
        disk:
          type: object
          required: [configured_mib, limit_bytes, used_bytes, enforced, enforcement_method]
          properties:
            configured_mib: {type: integer}
            limit_bytes: {type: integer}
            used_bytes: {type: integer}
            enforced: {type: boolean}
            enforcement_method: {type: string}
        network:
          type: object
          required: [rx_bytes, tx_bytes]
          properties:
            rx_bytes: {type: [integer, "null"]}
            tx_bytes: {type: [integer, "null"]}
    PullImageResponse:
      type: object
      required: [protocol, image, pulled]
      properties:
        protocol: {$ref: "#/components/schemas/Protocol"}
        image: {type: string}
        pulled: {type: boolean}
  responses:
    ApiError:
      description: Request rejection or server-side failure. Internal details are logged under error_id and are never returned to clients.
      headers:
        X-Error-Id:
          description: Opaque support identifier included for server-side failures.
          schema: {type: string, format: uuid}
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Unauthorized:
      description: Missing, invalid, or insufficient bearer token.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
paths:
  /api/system:
    get:
      summary: Get daemon runtime/configuration summary.
      x-required-scope: system:read
      responses:
        default:
          $ref: "#/components/responses/ApiError"
        "200":
          description: System status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /api/system/config:
    patch:
      summary: Merge a validated config patch into the daemon config file.
      description: Writes config.yml and returns restart_required=true. Refuses uuid, token_id, and token edits.
      x-required-scope: config:admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        default:
          $ref: "#/components/responses/ApiError"
        "200":
          description: Config patch applied.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConfigPatchResponse"
  /api/heartbeat:
    get:
      summary: Lightweight authenticated health check.
      x-required-scope: system:read
      responses:
        default:
          $ref: "#/components/responses/ApiError"
        "200":
          description: Heartbeat response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HeartbeatResponse"
        "503":
          description: API is alive but one or more database gateways are not ready.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HeartbeatResponse"
  /metrics:
    get:
      summary: Get Prometheus metrics for the daemon.
      x-required-scope: metrics:read
      responses:
        default:
          $ref: "#/components/responses/ApiError"
        "200":
          description: Prometheus text exposition.
          content:
            text/plain:
              schema:
                type: string
  /api/instances:
    get:
      summary: List database instances.
      x-required-scope: instances:read
      responses:
        default:
          $ref: "#/components/responses/ApiError"
        "200":
          description: Instance list.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Instance"
    post:
      summary: Create a database instance.
      x-required-scope: instances:write
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInstanceRequest"
      responses:
        default:
          $ref: "#/components/responses/ApiError"
        "202":
          description: Instance creation accepted and continuing in the background.
          headers:
            Location:
              description: Origin-relative instance creation status URL.
              schema: {type: string}
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateInstanceAcceptedResponse"
        "409":
          description: Instance ID already exists.
        "503":
          description: Creation admission is closed or the bounded creation queue is full.
  /api/instances/{instance_id}:
    parameters:
      - name: instance_id
        in: path
        required: true
        schema:
          type: string
    get:
      summary: Get one instance.
      x-required-scope: instances:read
      responses:
        default:
          $ref: "#/components/responses/ApiError"
        "200":
          description: Instance metadata.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Instance"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      summary: Irreversibly delete one instance, its managed container, jobs, artifacts, backups, recovery volumes, and all managed data.
      x-required-scope: instances:write
      parameters:
        - name: confirm
          in: query
          required: true
          description: Must be true because instance deletion always purges managed data.
          schema:
            type: boolean
            const: true
        - name: reason
          in: query
          required: true
          description: Audit reason for irreversible instance deletion; at most 512 characters.
          schema:
            type: string
            minLength: 1
            maxLength: 512
      responses:
        default:
          $ref: "#/components/responses/ApiError"
        "200":
          description: Delete result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteInstanceResponse"
  /api/instances/{instance_id}/status:
    get:
      summary: Get instance status.
      x-required-scope: instances:read
      parameters:
        - name: instance_id
          in: path
          required: true
          schema:
            type: string
      responses:
        default:
          $ref: "#/components/responses/ApiError"
        "200":
          description: Status response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InstanceStatusResponse"
  /api/instances/{instance_id}/limits:
    patch:
      summary: Update CPU, memory, and disk limits for an instance.
      x-required-scope: instances:write
      parameters:
        - name: instance_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LimitsRequest"
      responses:
        default:
          $ref: "#/components/responses/ApiError"
        "200":
          description: Updated instance metadata.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Instance"
  /api/instances/{instance_id}/reconcile:
    post:
      summary: Reconcile stored instance status with the container runtime.
      x-required-scope: instances:write
      parameters:
        - name: instance_id
          in: path
          required: true
          schema:
            type: string
      responses:
        default:
          $ref: "#/components/responses/ApiError"
        "200":
          description: Reconciled instance status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InstanceStatusResponse"
  /api/instances/{instance_id}/power:
    post:
