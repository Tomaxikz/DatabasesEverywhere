debug: false
uuid: dbe-node-generated-by-panel
token_id: dbe-token-id-generated-by-panel
token: REPLACE_WITH_32_BYTE_RANDOM_API_TOKEN
jwt_signing_key: REPLACE_WITH_32_BYTE_RANDOM_JWT_SIGNING_KEY
remote: https://playground.cleaveroute.com

tls:
  cert: /etc/nginx/ssl/cf/origin.pem
  key: /etc/nginx/ssl/cf/key.pem

postgres:
  enabled: true
  bind: 127.0.0.1:5434
  tls: false

mariadb:
  enabled: true
  bind: 127.0.0.1:3307
  tls: false

redis:
  enabled: true
  bind: 127.0.0.1:6380
  tls: false

mongodb:
  enabled: true
  bind: 127.0.0.1:27018
  tls: false

clickhouse:
  # Native TCP and HTTP are separate public gateways.
  enabled: true
  bind: 127.0.0.1:9000
  http_bind: 127.0.0.1:8123
  tls: false

qdrant:
  enabled: true
  bind: 127.0.0.1:6334
  tls: false

api:
  # Keep 127.0.0.1 behind a reverse proxy. For direct public HTTPS, use
  # 0.0.0.0 and enable the native TLS settings below.
  host: 127.0.0.1
  port: 8090
  ssl:
    enabled: false
    cert: ''
    key: ''
    require_client_cert: false
    client_ca: ''

security:
  api_body_limit_bytes: 1048576
  api_rate_limit_per_minute: 600
  db_connection_limit_per_minute: 240
  # Allows credential imports from remote databases without TLS. This does not
  # affect gateway binds or the management API's loopback-only requirement.
  allow_insecure_public_listeners: false
  allow_private_remote_imports: false
  remote_import_allowed_hosts: []
  # API self-upgrade is intentionally unsupported; use signed packages or a
  # digest-pinned container rollout. Validation rejects true.
  self_upgrade_enabled: false
  pids_limit: 512
  pids_limits:
    # Optional per-protocol overrides. ClickHouse needs more process/thread
    # headroom during startup than the lighter database images.
    clickhouse: 4096
    qdrant: null

artifacts:
  retention_keep_latest: 20
  retention_max_age_days: 30

backups:
  enabled: false
  interval_minutes: 1440
  run_on_startup: false
  retention_keep_latest_per_instance: 7
  retention_max_age_days: 30

disk:
  mode: fuse_quota
  # Native XFS/ext4 quota modes allocate at most 1,000,000 consecutive IDs
  # from this base. Reserve that range exclusively for DBE on the host.
  project_id_base: 200000
  # `embedded` is hash-verified automatically. For a custom helper, use an
  # absolute path in root-owned, non-writable directories and set its SHA-256.
  fuse_quota_binary: embedded
  fuse_quota_binary_sha256: ""
  fuse_quota_rescan_interval_seconds: 150

daemon:
  # docker or podman. Both use the Docker-compatible Bollard API.
  engine: docker
  # Optional. Leave empty for default socket discovery.
  socket_path: ""
  network: databases-everywhere
  # Restricts containers on the managed network from external network access.
  internal_network: true
  ipam:
    subnet: 172.30.0.0/16
    gateway: 172.30.0.1
  allow_public_backend_ports: false
  # Optional Docker HostConfig hardening knobs.
  container_read_only_rootfs: false
  container_userns_mode: ''
  container_seccomp_profile: ''
  container_apparmor_profile: ''
  container_security_opts: []

images:
  postgres: "postgres:18.4"
  redis: "redis:8.8.0"
  mariadb: "mariadb:12.3.2"
  # MongoDB 8.x is not compatible with Linux kernel 6.19+ / 7.x at the time
  # of writing due to SERVER-121912. If MongoDB fails to start with that
  # kernel warning, switch this to the latest known working 7.x tag:
  # "mongo:7.0.37"
  # https://www.mongodb.com/docs/v8.2/release-notes/8.0/#mongodb-8-0-incompatible-with-kernel-6-19
  # https://jira.mongodb.org/browse/SERVER-121912
  mongodb: "mongo:8.3.4"
  clickhouse: "clickhouse/clickhouse-server:26.4.4.38"
  qdrant: "qdrant/qdrant:v1.18.2"
  # Optional per-protocol update allowlist. The configured image above is always
  # allowed even if it is not repeated here.
  allowed:
    postgres:
      - "postgres:18.4"
    redis:
      - "redis:8.8.0"
    mariadb:
      - "mariadb:12.3.2"
    mongodb:
      - "mongo:8.3.4"
      - "mongo:7.0.37"
    clickhouse:
      - "clickhouse/clickhouse-server:26.4.4.38"
    qdrant:
      - "qdrant/qdrant:v1.18.2"

paths:
  data: /var/lib/dbev
  metadata: /var/lib/dbev/metadata
  volumes: /var/lib/dbev/volumes
  backups: /var/lib/dbev/backups
  sockets: /run/dbev/sockets
  locks: /run/dbev/locks
  logs: /var/log/dbev
  artifacts: /var/lib/dbev/artifacts
  exports: /var/lib/dbev/artifacts/exports
  imports: /var/lib/dbev/artifacts/imports
  fuse: /var/lib/dbev/fuse
  tmp: /var/lib/dbev/tmp
