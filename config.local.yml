debug: true
uuid: local-node
token_id: local-token-id
token: change-me
remote: http://127.0.0.1:8090

tls:
  cert: cert.pem
  key: key.pem

postgres:
  enabled: true
  bind: 0.0.0.0:5434
  tls: false

mariadb:
  enabled: true
  bind: 0.0.0.0:3307
  tls: false

redis:
  enabled: true
  bind: 0.0.0.0:6380
  tls: false

mongodb:
  enabled: true
  bind: 0.0.0.0:27018
  tls: false

clickhouse:
  enabled: true
  bind: 0.0.0.0:9000
  http_bind: 0.0.0.0:8123
  tls: false

qdrant:
  enabled: true
  bind: 0.0.0.0:6334
  tls: false

api:
  host: 127.0.0.1
  port: 8090
  ssl:
    enabled: false
    cert: ''
    key: ''
    require_client_cert: false
    client_ca: ''

security:
  api_body_limit_bytes: 1048576
  api_rate_limit_per_minute: 600
  db_connection_limit_per_minute: 240
  allow_private_remote_imports: false
  remote_import_allowed_hosts: []
  self_upgrade_enabled: false
  pids_limit: 512
  pids_limits:
    clickhouse: 4096

artifacts:
  retention_keep_latest: 20
  retention_max_age_days: 30

backups:
  enabled: false
  interval_minutes: 1440
  run_on_startup: false
  retention_keep_latest_per_instance: 7
  retention_max_age_days: 30

disk:
  mode: advisory
  project_id_base: 200000

daemon:
  engine: podman
  socket_path: /run/user/1000/podman/podman.sock
  network: databases-everywhere
  internal_network: true
  ipam:
    subnet: 172.30.0.0/16
    gateway: 172.30.0.1
  allow_public_backend_ports: false
  container_read_only_rootfs: false
  container_userns_mode: ''
  container_seccomp_profile: ''
  container_apparmor_profile: ''
  container_security_opts: []

images:
  postgres: "postgres:18.4"
  redis: "redis:8.8.0"
  mariadb: "mariadb:12.3.2"
  # MongoDB 8.x is not compatible with Linux kernel 6.19+ / 7.x at the time
  # of writing due to SERVER-121912. If MongoDB fails to start with that
  # kernel warning, switch this to the latest known working 7.x tag:
  # "mongo:7.0.37"
  # https://www.mongodb.com/docs/v8.2/release-notes/8.0/#mongodb-8-0-incompatible-with-kernel-6-19
  # https://jira.mongodb.org/browse/SERVER-121912
  mongodb: "mongo:8.3.4"
  clickhouse: "clickhouse/clickhouse-server:26.4.4.38"
  qdrant: "qdrant/qdrant:v1.18.2"
  allowed:
    postgres:
      - "postgres:18.4"
    redis:
      - "redis:8.8.0"
    mariadb:
      - "mariadb:12.3.2"
    mongodb:
      - "mongo:8.3.4"
      - "mongo:7.0.37"
    clickhouse:
      - "clickhouse/clickhouse-server:26.4.4.38"
    qdrant:
      - "qdrant/qdrant:v1.18.2"

paths:
  data: /mnt/4tb/Github/DatabasesEverywhere/.local/data
  metadata: /mnt/4tb/Github/DatabasesEverywhere/.local/data/metadata
  volumes: /mnt/4tb/Github/DatabasesEverywhere/.local/data/volumes
  backups: /mnt/4tb/Github/DatabasesEverywhere/.local/data/backups
  sockets: /tmp/databases-everywhere/sockets
  locks: /tmp/databases-everywhere/locks
  logs: /mnt/4tb/Github/DatabasesEverywhere/.local/logs
  artifacts: /mnt/4tb/Github/DatabasesEverywhere/.local/artifacts
  exports: /mnt/4tb/Github/DatabasesEverywhere/.local/artifacts/exports
  imports: /mnt/4tb/Github/DatabasesEverywhere/.local/artifacts/imports
  fuse: /mnt/4tb/Github/DatabasesEverywhere/.local/data/fuse
  tmp: /mnt/4tb/Github/DatabasesEverywhere/.local/data/tmp
