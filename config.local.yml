debug: true
uuid: local-node
token_id: local-token-id
token: local-dev-api-token-0123456789abcdef-01
jwt_signing_key: local-dev-jwt-signing-key-0123456789abcdef-02
remote: http://127.0.0.1:8090

tls:
  cert: cert.pem
  key: key.pem

postgres:
  enabled: true
  bind: 0.0.0.0:5434
  tls: false

mariadb:
  enabled: true
  bind: 0.0.0.0:3307
  tls: false

redis:
  enabled: true
  bind: 0.0.0.0:6380
  tls: false

mongodb:
