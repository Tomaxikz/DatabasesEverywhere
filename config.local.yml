  bind: 0.0.0.0:27018
  tls: false

clickhouse:
  enabled: true
  bind: 0.0.0.0:9000
  http_bind: 0.0.0.0:8123
  tls: false

qdrant:
  enabled: true
  bind: 0.0.0.0:6334
  tls: false

api:
  host: 127.0.0.1
  port: 8090
  ssl:
    enabled: false
    cert: ''
    key: ''
    require_client_cert: false
    client_ca: ''

security:
  api_body_limit_bytes: 1048576
  api_rate_limit_per_minute: 600
  db_connection_limit_per_minute: 240
  # This file is for isolated local development only.
  self_upgrade_enabled: false
  pids_limit: 512
  pids_limits:
    clickhouse: 4096

artifacts:
  retention_keep_latest: 20
  retention_max_age_days: 30

backups:
  enabled: false
  interval_minutes: 1440
  run_on_startup: false
  retention_keep_latest_per_instance: 7
  retention_max_age_days: 30

disk:
  project_id_base: 200000

daemon:
  engine: podman
  socket_path: /run/user/1000/podman/podman.sock
  # Database containers always use network_mode=none and private Unix sockets.
  container_read_only_rootfs: false
  container_userns_mode: ''
  container_seccomp_profile: ''
  container_apparmor_profile: ''
  container_security_opts: []

